# Example workflow using kubix_ci GitHub Action
# Copy this to your repo's .github/workflows/ directory

name: GPU Kernel Tests

on:
  push:
    branches: [main]
    paths:
      - '**/*.cu'
      - 'kubix_ci.yml'
  pull_request:
    paths:
      - '**/*.cu'
      - 'kubix_ci.yml'
  workflow_dispatch:  # Manual trigger

jobs:
  gpu-test:
    runs-on: ubuntu-latest
    name: Test CUDA Kernels

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run GPU tests
        uses: kubix-ai/kubix_ci@v1
        with:
          kernel: 'kernels/*.cu'  # or specific file: 'src/matmul.cu'
          config: 'kubix_ci.yml'
          ssh-key: ${{ secrets.GPU_SSH_KEY }}
          post-comment: 'true'
          fail-on-error: 'true'
